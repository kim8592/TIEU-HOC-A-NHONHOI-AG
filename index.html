<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>GỌI TÊN NGẪU NHIÊN</title>
<link rel="stylesheet" href="style.css">

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>

<body>

<header>
  <button onclick="showScreen('manage')">⚙️ Quản lý</button>
  <button onclick="showScreen('present')">🎬 Trình chiếu</button>
</header>

<audio id="soundCall" src="ten.mp3" preload="auto"></audio>
<audio id="soundCorrect" src="dung.mp3" preload="auto"></audio>
<audio id="soundWrong" src="sai.mp3" preload="auto"></audio>

<!-- ===== QUẢN LÝ ===== -->
<section id="manage" class="active">
TRẦN TRỌNG KIM - TH KHÁNH BÌNH - 0964567806
  <h2>📋 Danh sách học sinh</h2>
  <textarea id="studentInput" placeholder="Mỗi dòng 1 tên"></textarea>
  <button onclick="saveStudents()">💾 Lưu danh sách</button>
  <button onclick="resetStudents()">🔄 Reset Danh Sách Học Sinh</button>
  <p id="studentCount"></p>

  <hr>

  <h2>❓ Tạo câu hỏi</h2>
  <input id="qText" placeholder="Nhập câu hỏi">
  <input class="opt" placeholder="Đáp án 1">
  <input class="opt" placeholder="Đáp án 2">
  <input class="opt" placeholder="Đáp án 3">
  <input class="opt" placeholder="Đáp án 4">

  <select id="correct">
    <option value="">Chọn đáp án đúng</option>
    <option value="0">Đáp án 1</option>
    <option value="1">Đáp án 2</option>
    <option value="2">Đáp án 3</option>
    <option value="3">Đáp án 4</option>
  </select>

  <button onclick="addQuestion()">➕ Thêm câu hỏi</button>
  <button onclick="resetQuestions()">🔄 Reset Câu Hỏi</button>
  <p id="qCount"></p>
</section>

<!-- ===== TRÌNH CHIẾU ===== -->
<section id="present">
  <div id="presentBox">
    <button onclick="callName()">🎓 GỌI TÊN</button>
    <h1 id="nameDisplay"></h1>

    <hr>

    <button onclick="startQuiz()">❓ BẮT ĐẦU TRẮC NGHIỆM</button>
    <h2 id="quizQuestion"></h2>
    <div id="quizOptions"></div>
    <h2 id="quizResult"></h2>
    <button onclick="nextQuestion()">➡️ CÂU TIẾP</button>
  </div>
</section>

<!-- camera ẩn -->
<video id="inputVideo" style="display:none"></video>

<script src="main.js"></script>
</body>
</html>
